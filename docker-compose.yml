services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: thanamol_crm
      POSTGRES_USER: thanamol
      POSTGRES_PASSWORD: thanamol_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thanamol -d thanamol_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
