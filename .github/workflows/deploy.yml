name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          command_timeout: 20m
          script: |
            set -e
            cd /opt/thanamol-crm

            echo "=== Pulling latest code ==="
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "=== Building containers ==="
            cd deploy
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod build --no-cache

            echo "=== Starting services ==="
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

            echo "=== Waiting for services ==="
            sleep 15

            echo "=== Health check ==="
            curl -sf http://localhost:8080/api/health || (echo "Health check failed!" && sudo docker compose -f docker-compose.prod.yml logs api --tail 20 && exit 1)

            echo "=== Deploy complete ==="
